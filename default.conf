upstream redoc {
    server doc-api-redoc:80;
}

upstream backend {
    server api:3000;
}

# Rate limiting para API pública
limit_req_zone $binary_remote_addr zone=public_api:10m rate=10r/s;

server {
    listen 80;
    server_name api.tooldata.io api.localhost;

    root /var/www;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # --- Health check ---
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # --- API Pública: Solo /collections ---
    location /collections {
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, x-access-token, Content-Type' always;
        add_header 'Access-Control-Max-Age' 86400 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Solo GET permitido
        limit_except GET {
            deny all;
        }

        # Rate limiting
        limit_req zone=public_api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffers
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_buffering off;
    }

    # --- Servir OpenAPI spec ---
    location ~ \.(yml|yaml) {
        add_header Content-Type text/plain;
        add_header Access-Control-Allow-Origin *;
    }

    # --- Documentación (Redoc) ---
    location / {
        proxy_pass http://redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
